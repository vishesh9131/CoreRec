name: Tests

on:
  push:
    branches: [main, develop, "unified/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }} / Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run production model tests (required)
        run: |
          python -m pytest tests/test_all_production_models.py -v --tb=short

      - name: Run core tests
        run: |
          python -m pytest tests/test_base_recommender.py \
                           tests/test_engine_models.py \
                           tests/test_imports.py \
                           -v --tb=short || true

  test-examples:
    name: Example script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check example scripts parse correctly
        run: |
          for f in examples/*.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
          echo "All example scripts syntax check passed"
