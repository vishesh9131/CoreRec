name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  # ── Job 1: Structural & link tests (fast, no heavy deps) ──────────────
  docs-tests:
    name: Documentation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install project (importability tests need corerec)
        run: |
          pip install -e ".[docs]" || pip install -e . || true

      - name: Run doc structure tests (skip build tests)
        run: |
          python -m pytest tests/test_docs.py \
            -m "not docs_build" \
            -v --tb=short --no-header \
            --junitxml=docs-test-results.xml \
            -p no:cacheprovider \
            2>&1 | tee docs-test-output.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-test-results
          path: |
            docs-test-results.xml
            docs-test-output.txt

  # ── Job 2: MkDocs build ───────────────────────────────────────────────
  mkdocs-build:
    name: MkDocs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build MkDocs (strict mode)
        run: |
          mkdocs build --strict --clean 2>&1 | tee mkdocs-build.log

      - name: Check for warnings in build log
        if: always()
        run: |
          echo "## MkDocs Build Warnings" >> $GITHUB_STEP_SUMMARY
          if grep -iE "(warning|error|not found)" mkdocs-build.log; then
            echo "::warning::MkDocs build produced warnings — check build log"
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iE "(warning|error|not found)" mkdocs-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No warnings found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log

  # ── Job 3: Sphinx build ───────────────────────────────────────────────
  sphinx-build:
    name: Sphinx Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Sphinx dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-book-theme sphinx-copybutton sphinx-design myst-parser
          pip install -e . || true

      - name: Build Sphinx HTML
        run: |
          python -m sphinx \
            -b html \
            --keep-going \
            docs/source docs/build/html \
            2>&1 | tee sphinx-build.log

      - name: Summarize Sphinx warnings
        if: always()
        run: |
          echo "## Sphinx Build Warnings" >> $GITHUB_STEP_SUMMARY
          if grep -cE "WARNING|ERROR" sphinx-build.log > /dev/null 2>&1; then
            WARNING_COUNT=$(grep -cE "WARNING|ERROR" sphinx-build.log || echo 0)
            echo "Found **$WARNING_COUNT** warnings/errors." >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "WARNING|ERROR" sphinx-build.log | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No warnings found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-build-log
          path: sphinx-build.log

  # ── Job 4: Deploy (only on main push, after builds pass) ──────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [docs-tests, mkdocs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
