name: CoreRec CI

on:
  push:
    branches: [main, master, develop, "unified/*"]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # Production-model tests – MUST pass before merging                   #
  # ------------------------------------------------------------------ #
  model-tests:
    name: Model tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run production model tests
        run: |
          python -m pytest tests/test_all_production_models.py -v \
            --tb=short --strict-markers

      - name: Run full test suite
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/contentFilterEngine \
            --ignore=tests/unionizedFilterEngine \
            -x -q

  # ------------------------------------------------------------------ #
  # Lint – fast feedback on code quality                                #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff

      - name: Ruff check (syntax errors / undefined names)
        run: ruff check . --select=E9,F63,F7,F82 --no-fix
